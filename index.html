        .card-custom {

        .form-check-label {

            color: #4a4a4a;

            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-size: 1.1rem;
        }
        .line-btn:hover { color: white; background-color: #05b04b; }
    </style>
