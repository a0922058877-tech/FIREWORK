<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動線上報名</title>
    <style>
        /* 簡約奶油色調風格 */
        body {
            font-family: "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: #fcf9f2; /* 溫柔的奶油白 */
            color: #4a4a4a;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
            margin: 20px;
        }

        h2 {
            text-align: center;
            color: #7c6c5a; /* 暖木調棕色 */
            margin-bottom: 10px;
            font-size: 24px;
        }

        .description {
            text-align: center;
            font-size: 14px;
            color: #8c8c8c;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 15px;
            color: #5c5c5c;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e3dec3;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #faf9f5;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #b5a48c;
            background-color: #ffffff;
        }

        .submit-btn {
            background-color: #a39274; /* 質感莫蘭迪棕 */
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #8c7c5f;
        }

        /* 響應式調整 */
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>活動線上報名</h2>
    <p class="description">請填寫以下資訊完成報名，我們將於活動前發送確認通知。</p>
    
    <!-- 報名表單開始 -->
    <!-- 請將下面的 action 網址替換為你的 Google 表單產生的後台接收網址 -->
    <form action="你的_GOOGLE_表單_HACKS_網址" method="POST" id="registrationForm">
        
        <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" name="entry.123456789" placeholder="請輸入您的真實姓名" required>
        </div>

        <div class="form-group">
            <label for="phone">聯絡電話</label>
            <input type="tel" id="phone" name="entry.987654321" placeholder="例如：0912345678" required>
        </div>

        <div class="form-group">
            <label for="email">電子信箱</label>
            <input type="email" id="email" name="entry.112233445" placeholder="例如：example@gmail.com" required>
        </div>

        <div class="form-group">
            <label for="session">欲報名場次</label>
            <select id="session" name="entry.556677889" required>
                <option value="" disabled selected>請選擇場次</option>
                <option value="場次 A：週六上午場">場次 A：週六上午場 (10:00 - 12:00)</option>
                <option value="場次 B：週日下午場">場次 B：週日下午場 (14:00 - 16:00)</option>
            </select>
        </div>

        <button type="submit" class="submit-btn">提交報名表</button>
    </form>
</div>

</body>
</html>
