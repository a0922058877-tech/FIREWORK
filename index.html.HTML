<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026淡水仲夏繽紛樂煙火航班－第三梯次預約</title>
    <style>
        :root {
            --primary: #0A2540; /* 深海藍 */
            --accent: #D4AF37;  /* 煙火金 */
            --bg-light: #F4F7F9;
            --text-dark: #2C3E50;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .hero-banner {
            background: linear-gradient(rgba(10, 37, 64, 0.85), rgba(10, 37, 64, 0.95)), 
                        url('https://images.unsplash.com/photo-1533928298208-27ff66555d8d?auto=format&fit=crop&w=1200&q=80') no-repeat center/cover;
            color: white;
            text-align: center;
            padding: 50px 20px;
        }

        .hero-banner h1 {
            color: var(--accent);
            font-size: 26px;
            margin-bottom: 10px;
        }

        .hero-banner p {
            font-size: 15px;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            max-width: 600px;
            margin: -30px auto 40px auto;
            padding: 0 15px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        h2 {
            color: var(--primary);
            border-left: 5px solid var(--accent);
            padding-left: 10px;
            font-size: 18px;
            margin-top: 0;
        }

        .alert-box {
            background-color: #FFF9E6;
            border-left: 4px solid #FFA000;
            padding: 15px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .calculator {
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .price-display {
            font-size: 22px;
            font-weight: bold;
            color: #D32F2F;
            text-align: center;
            margin-top: 15px;
            background: #FFEBEE;
            padding: 10px;
            border-radius: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 15px;
        }

        input[type="text"], input[type="tel"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .btn-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: #051424;
        }
    </style>
</head>
<body>

<div class="hero-banner">
    <h1>2026 淡水仲夏繽紛樂煙火航班</h1>
    <p>第三梯次（8月23日）預約登記表｜順風航業</p>
</div>

<div class="container">
    
    <div class="card">
        <h2>活動須知 & 匯款資料</h2>
        <div class="alert-box">
            ⚠️ <strong>重要提示：</strong>本活動採<strong>限額 680 位</strong>預約制。送出表單不代表預約成立，須核對匯款入帳，並收到官方 LINE 確認通知後才算預約成功！
        </div>
        <p style="font-size: 14px; margin: 0; padding: 0; list-style: none;">
            <strong>【票價說明】</strong>每位 300 元（未稅）。未滿 3 足歲以下幼童免票。<br>
            <strong>【銀行名稱】</strong>淡水第一信用合作社－營業部 (代號：119)<br>
            <strong>【匯款帳號】</strong>0029-21-210041-0<br>
            <strong>【戶名】</strong>順風航業股份有限公司
        </p>
    </div>

    <div class="card">
        <h2>填寫報名資料</h2>
        
        <form action="https://docs.google.com/forms/d/e/1FAIpQLSc0TC_4cZJWY6cdjtYYepBfE7ZXqQd6ScIN06la5jshynSuGg/formResponse" method="POST">
            
            <div class="form-group">
                <label>聯絡人姓名</label>
                <input type="text" name="entry.12260477" placeholder="請輸入您的真實姓名" required>
            </div>

            <div class="form-group">
                <label>聯絡電話</label>
                <input type="tel" name="entry.193987636" placeholder="例如：0912345678" required>
            </div>

            <div class="calculator">
                <div class="form-group">
                    <label>報名人數 (含幼童)</label>
                    <input type="number" id="attendees" name="entry.153116363" min="1" value="1" required onchange="calculateTotal()">
                </div>

                <div class="form-group">
                    <label>是否需要發票（發票另加 5% 稅額）</label>
                    <div class="radio-group">
                        <label><input type="radio" name="invoice" value="no" checked onclick="calculateTotal()"> 不需要</label>
                        <label><input type="radio" name="invoice" value="yes" onclick="calculateTotal()"> 需要 (外加5%)</label>
                    </div>
                </div>

                <div class="price-display" id="totalPriceDisplay">
                    您應匯款總金額：NT$ 300 元
                </div>
            </div>

            <button type="submit" class="btn-submit">確認已匯款，送出報名表</button>
        </form>
    </div>
</div>

<script>
    function calculateTotal() {
        const attendees = parseInt(document.getElementById('attendees').value) || 0;
        const needInvoice = document.querySelector('input[name="invoice"]:checked').value;
        let total = attendees * 300;
        if (needInvoice === 'yes') {
            total = Math.round(total * 1.05);
        }
        document.getElementById('totalPriceDisplay').innerText = `您應匯款總金額：NT$ ${total} 元`;
    }
</script>

</body>
</html>
